name: abaplint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  abaplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pinned dependencies
        run: npm ci
      - name: Run abaplint
        run: npm run lint
